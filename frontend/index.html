<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tracker PVZ</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app">
        <!-- Шапка с приветствием (только на главной) -->
        <header class="header" id="mainHeader">
            <div class="greeting">
                <span class="greeting-text" id="greetingText">Доброе утро</span>
                <span class="user-name" id="userNameDisplay">друг</span>
            </div>
            <div class="header-actions">
                <a href="https://t.me/n33ylow" target="_blank" class="telegram-link" id="telegramLink">
                    <span class="telegram-icon"></span>
                </a>
            </div>
        </header>

        <!-- Шапка для других страниц (простая) -->
        <header class="header simple-header" id="simpleHeader" style="display: none;">
            <div class="greeting">
                <span class="greeting-text" id="simpleGreetingText"></span>
                <span class="user-name" id="simpleUserNameDisplay"></span>
            </div>
        </header>

        <!-- Основной контент -->
        <main id="content" class="content">
            <!-- Сюда будут загружаться страницы -->
        </main>

        <!-- Нижняя навигация -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-page="feed">
                <span class="nav-icon">🏠</span>
                <span class="nav-label">Лента</span>
            </button>
            <button class="nav-item" data-page="pvz">
                <span class="nav-icon">🏢</span>
                <span class="nav-label">ПВЗ</span>
            </button>
            <button class="nav-item" data-page="add">
                <span class="nav-icon">➕</span>
                <span class="nav-label">Добавить</span>
            </button>
            <button class="nav-item" data-page="list">
                <span class="nav-icon">📋</span>
                <span class="nav-label">Список</span>
            </button>
            <button class="nav-item" data-page="report">
                <span class="nav-icon">📊</span>
                <span class="nav-label">Отчет</span>
            </button>
            <button class="nav-item" data-page="settings">
                <span class="nav-icon">⚙️</span>
                <span class="nav-label">Места</span>
            </button>
        </nav>
    </div>

    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/app.js"></script>
    <script src="js/pvz.js"></script>
</body>
</html>
